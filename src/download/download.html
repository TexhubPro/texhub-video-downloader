<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Video Download — TexHub Video Downloader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: 520px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo svg { width: 28px; height: 28px; }
    .logo img { width: 30px; height: 30px; border-radius: 7px; display: block; }
    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #f6a942, #f09018);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #status {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 18px;
      min-height: 24px;
    }
    .bar {
      height: 10px;
      background: #21262d;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      background: linear-gradient(90deg, #f09018, #f6a942, #f09018);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      transition: width .3s;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .bar-fill.done { animation: none; background: #10b981; }
    .info {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 20px;
    }
    .log {
      background: #0d1117;
      border-radius: 8px;
      padding: 14px;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 11px;
      color: #8b949e;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .ok { color: #10b981; font-weight: 700; }
    .err { color: #ef4444; }
    .cancel-btn {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: transparent;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    .cancel-btn:hover { border-color: #ef4444; color: #ef4444; }
    .cancel-btn.hide { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="../../icons/icon48.png" alt="TexHub">
      <h1>TexHub Video Downloader</h1>
    </div>
    <div id="status">Preparing download...</div>
    <div class="bar"><div class="bar-fill" id="fill"></div></div>
    <div class="info">
      <span id="seg">0 / 0</span>
      <span id="sz">0 B</span>
    </div>
    <div class="log" id="log"></div>
    <button class="cancel-btn" id="cancelBtn">Cancel</button>
  </div>
  <script src="../lib/mux.min.js"></script>
  <script src="../lib/remuxer.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="download.js"></script>
</body>
</html>
